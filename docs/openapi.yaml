          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/paginationLimit'
      responses:
        '200':
          description: List of drafts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Draft'
                  pagination:
                    $ref: '#/components/schemas/CursorPagination'

  /tenants/{tenantId}/drafts/{id}:
    patch:
      tags: [Drafts]
      summary: Approve or reject draft
      security:
        - BearerAuth: []
        - TenantApiKey: []
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [approved, rejected]
                reviewed_by:
                  type: string
      responses:
        '200':
          description: Draft status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'

  /tenants/{tenantId}/drafts/{id}/send:
    post:
      tags: [Drafts]
      summary: Send approved draft
      security:
        - BearerAuth: []
        - TenantApiKey: []
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Draft sent
        '400':
          description: Draft must be approved first

  # ── Chat ──
  /tenants/{tenantId}/chat:
    post:
      tags: [Chat]
      summary: Test knowledge base with a question
      description: Send a question and get an AI-generated answer using the tenant's knowledge base. Returns the answer and the KB sources used.
      security:
        - BearerAuth: []
        - TenantApiKey: []
      parameters:
        - $ref: '#/components/parameters/tenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
                  description: The question to ask
                history:
                  type: array
                  description: Previous conversation messages for multi-turn chat
                  items:
                    type: object
                    required: [role, content]
                    properties:
                      role:
                        type: string
                        enum: [user, assistant]
                      content:
                        type: string
      responses:
        '200':
          description: AI-generated answer with KB sources
          content:
            application/json:
              schema:
                type: object
                properties:
                  answer:
                    type: string
                  sources:
                    type: array
                    items:
                      type: object
                      properties:
                        chunk_id:
                          type: string
                          format: uuid
                        article_id:
                          type: string
                          format: uuid
                        content:
                          type: string
                  tokens_used:
                    type: integer
                    nullable: true
        '400':
          description: Missing question
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Attachments ──
  /tenants/{tenantId}/attachments/{attachmentId}:
    get:
      tags: [Tickets]
      summary: Serve attachment file
      description: Returns the attachment file. Files are stored locally after download from the source system.
      security:
        - BearerAuth: []
        - TenantApiKey: []
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Attachment file
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Attachment not found

  # ── Webhooks ──
  /webhooks/{tenantId}/apps/{appId}:
    post:
      tags: [Webhooks]
      summary: Receive webhook from provider
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - name: appId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Webhook received
        '401':
          description: Invalid signature
