        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/paginationLimit'
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, sent]
        - name: offset
          in: query
          deprecated: true
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: List of drafts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Draft'
                  pagination:
                    $ref: '#/components/schemas/CursorPagination'

  /tenants/{tenantId}/tickets/{id}/draft:
