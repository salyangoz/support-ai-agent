          description: Draft generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'

  /tenants/{tenantId}/tickets/{id}/drafts:
    get:
      tags: [Drafts]
      summary: List drafts for ticket
      security:
        - BearerAuth: []
        - TenantApiKey: []
