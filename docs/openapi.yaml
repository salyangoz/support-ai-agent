  # ── Knowledge Articles ──
  /tenants/{tenantId}/knowledge-articles:
    get:
      tags: [Knowledge Articles]
      summary: List knowledge articles
      security:
        - BearerAuth: []
        - TenantApiKey: []
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/paginationLimit'
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: is_active
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          deprecated: true
          schema:
            type: integer
      responses:
        '200':
          description: Paginated article list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/KnowledgeArticle'
                  pagination:
                    $ref: '#/components/schemas/CursorPagination'
    post:
      tags: [Knowledge Articles]
      summary: Create knowledge article
      security:
        - BearerAuth: []
        - TenantApiKey: []
      parameters:
        - $ref: '#/components/parameters/tenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content]
              properties:
                title:
                  type: string
                content:
                  type: string
                category:
                  type: string
      responses:
        '201':
          description: Article created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeArticle'

  /tenants/{tenantId}/knowledge-articles/{id}:
    get:
      tags: [Knowledge Articles]
      summary: Get knowledge article
      security:
        - BearerAuth: []
        - TenantApiKey: []
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Article details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeArticle'
    put:
      tags: [Knowledge Articles]
      summary: Update knowledge article
      security:
        - BearerAuth: []
        - TenantApiKey: []
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                category:
                  type: string
      responses:
        '200':
          description: Article updated
    delete:
      tags: [Knowledge Articles]
      summary: Soft-delete knowledge article
      security:
        - BearerAuth: []
        - TenantApiKey: []
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted

  /tenants/{tenantId}/knowledge-articles/embed:
    post:
      tags: [Knowledge Articles]
      summary: Trigger embedding for all articles
      description: Manually trigger embedding generation for all knowledge base chunks that don't have embeddings yet.
      security:
        - BearerAuth: []
        - TenantApiKey: []
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '202':
          description: Embedding jobs queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  enqueued:
                    type: integer
                    description: Number of embedding jobs added to the queue
                  message:
                    type: string

  /tenants/{tenantId}/knowledge-articles/{id}/embed:
    post:
      tags: [Knowledge Articles]
      summary: Trigger embedding for a single article
      description: Manually trigger embedding generation for chunks of a specific article.
      security:
        - BearerAuth: []
        - TenantApiKey: []
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Embedding results for the article
          content:
            application/json:
              schema:
                type: object
                properties:
                  article_id:
                    type: string
                    format: uuid
                  processed:
                    type: integer
                  failed:
                    type: integer
                  embedding_status:
                    type: object
                    properties:
                      total_chunks:
                        type: integer
                      embedded_chunks:
                        type: integer
        '404':
          description: Article not found

  /tenants/{tenantId}/knowledge-articles/generate-from-tickets:
    post:
      tags: [Knowledge Articles]
      summary: Generate KB articles from closed tickets
      description: Summarizes closed tickets that don't have KB articles yet using AI, and creates knowledge base articles from them.
      security:
        - BearerAuth: []
        - TenantApiKey: []
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '202':
          description: KB generation jobs queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  enqueued:
                    type: integer
                    description: Number of KB generation jobs added to the queue
                  message:
                    type: string

