version: '3.8'

services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://support_ai:password@db:5432/yengec_support_ai
      - YENGEC_AI_BASE_URL=https://ai.yengec.co
      - LOG_LEVEL=info
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: support_ai
      POSTGRES_PASSWORD: password
      POSTGRES_DB: yengec_support_ai
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: support_ai_test
      POSTGRES_PASSWORD: password
      POSTGRES_DB: yengec_support_ai_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support_ai_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
