apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: support-ai-agent
  namespace: support-ai
  labels:
    app: support-ai-agent
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - support-ai.yengec.co
      secretName: support-ai-tls
  rules:
    - host: support-ai.yengec.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: support-ai-agent
                port:
                  number: 3001
