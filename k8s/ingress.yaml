apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  namespace: support-ai
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: support-api.yengec.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: support-ai-agent
                port:
                  number: 3001
