# ─── API HPA ───
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: support-ai-api
  labels:
    app: support-ai-agent
    component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: support-ai-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# ─── Worker HPA ───
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: support-ai-worker
  labels:
    app: support-ai-agent
    component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: support-ai-worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
