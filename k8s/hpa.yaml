apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: support-ai-agent
  namespace: support-ai
  labels:
    app: support-ai-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: support-ai-agent
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
