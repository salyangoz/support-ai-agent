apiVersion: apps/v1
kind: Deployment
metadata:
  name: support-ai-agent
  namespace: support-ai
  labels:
    app: support-ai-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: support-ai-agent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: support-ai-agent
    spec:
      containers:
        - name: support-ai-agent
          image: ghcr.io/salyangoz/support-ai-agent:latest
          ports:
            - containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: support-ai-config
            - secretRef:
                name: support-ai-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
