# Host-side Redis exposure.
# Redis runs on the host (outside the cluster). Pods reach it via this
# headless Service + manually-managed EndpointSlice that points to the node IP.
# Update `endpoints[0].addresses[0]` to the IP reachable from pods (typically the
# node's internal IP shown by `kubectl get node -o wide`).
---
apiVersion: v1
kind: Service
metadata:
  name: external-redis
  labels:
    app: support-ai-agent
    component: redis
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: external-redis
  labels:
    kubernetes.io/service-name: external-redis
    app: support-ai-agent
    component: redis
addressType: IPv4
ports:
  - name: redis
    port: 6379
    protocol: TCP
endpoints:
  - addresses:
      - "10.42.0.1" # REPLACE: host IP reachable from cluster pods
    conditions:
      ready: true
