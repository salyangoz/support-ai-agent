# Host-side Redis exposure.
# Redis runs on the host (outside the cluster). Pods reach it via this
# headless Service + manually-managed Endpoints that point to the node IP.
# Update `addresses[0].ip` to the IP reachable from pods (typically the
# node's internal IP shown by `kubectl get node -o wide`).
---
apiVersion: v1
kind: Service
metadata:
  name: external-redis
  labels:
    app: support-ai-agent
    component: redis
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: external-redis
  labels:
    app: support-ai-agent
    component: redis
subsets:
  - addresses:
      - ip: 10.42.0.1
    ports:
      - port: 6379
        protocol: TCP
